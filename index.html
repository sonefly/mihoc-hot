<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球热榜 - 全球 AI 科技热点</title>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --orange: #d2991d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; line-height: 1.6; }
  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
  header { text-align: center; padding: 40px 0 20px; border-bottom: 1px solid var(--border); margin-bottom: 30px; }
  header h1 { font-size: 28px; margin-bottom: 8px; }
  header p { color: var(--text-dim); font-size: 14px; }
  .update-time { color: var(--text-dim); font-size: 12px; margin-top: 5px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
  .section { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
  .section h2 { font-size: 18px; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .item { padding: 8px 0; border-bottom: 1px solid rgba(48,54,61,0.5); }
  .item:last-child { border-bottom: none; }
  .item .rank { display: inline-block; width: 24px; height: 24px; line-height: 24px; text-align: center; border-radius: 4px; font-size: 12px; font-weight: bold; margin-right: 8px; background: var(--border); color: var(--text-dim); }
  .item .rank.hot { background: #da3633; color: #fff; }
  .item .rank.warm { background: var(--orange); color: #fff; }
  .item a { color: var(--accent); text-decoration: none; font-size: 15px; }
  .item a:hover { text-decoration: underline; }
  .item .meta { font-size: 12px; color: var(--text-dim); margin-left: 32px; margin-top: 2px; }
  .item .score { color: var(--green); font-weight: bold; margin-left: 8px; font-size: 12px; }
  .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab { padding: 8px 16px; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; font-size: 14px; background: var(--card); color: var(--text); }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tab:hover { border-color: var(--accent); }
  footer { text-align: center; padding: 30px 0; color: var(--text-dim); font-size: 13px; border-top: 1px solid var(--border); margin-top: 30px; }
  footer a { color: var(--accent); }
  .full-width { grid-column: 1 / -1; }
  .loading { text-align: center; padding: 40px; color: var(--text-dim); }
  .error { background: #da3633; color: #fff; padding: 12px 20px; border-radius: 8px; margin-bottom: 20px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🌍 全球热榜</h1>
    <p>全球 AI 科技热点聚合 · Hacker News · GitHub · Stack Overflow · 微信热文</p>
    <p class="update-time" id="updateTime">加载中...</p>
  </header>

  <div class="tabs">
    <span class="tab active" onclick="showTab('all')">🔥 全部</span>
    <span class="tab" onclick="showTab('hackernews')">💻 Hacker News</span>
    <span class="tab" onclick="showTab('github')">⭐ GitHub</span>
    <span class="tab" onclick="showTab('stackoverflow')">📚 Stack Overflow</span>
    <span class="tab" onclick="showTab('wechat')">💬 微信热文</span>
    <span class="tab" onclick="showTab('bluesky')">🦋 Bluesky</span>
    <span class="tab" onclick="showTab('devto')">📝 Dev.to</span>
  </div>

  <div id="content" class="grid">
    <div class="loading">正在加载热点数据...</div>
  </div>

  <footer>
    <p>数据来源: trend-pulse (37 个全球源) + tophub.today (微信热文) | 每小时自动更新</p>
    <p>sonefly@gmail.com，每天一份全球热点速递</p>
  </footer>
</div>

<script>
let allData = [];
let currentTab = 'all';

async function loadData() {
  try {
    const resp = await fetch('data/trending.json');
    const json = await resp.json();
    allData = json.global || [];
    allData = allData.concat((json.wechat || []).map(d => ({...d, source: 'wechat'})));
    document.getElementById('updateTime').textContent = `更新时间: ${json.updated?.slice(0,19) || '未知'}`;
    renderAll();
  } catch(e) {
    document.getElementById('content').innerHTML = `
      <div class="error full-width">⚠️ 数据加载失败: ${e.message}<br>请确保 data/trending.json 文件存在</div>`;
  }
}

function renderAll() {
  showTab('all');
}

function getRankClass(i) {
  if (i <= 3) return 'hot';
  if (i <= 6) return 'warm';
  return '';
}

function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event?.target?.classList.add('active');
  // 找到正确的tab元素
  document.querySelectorAll('.tab').forEach(t => {
    if (t.textContent.includes(tab === 'all' ? '全部' : tab)) t.classList.add('active');
  });

  let filtered = tab === 'all' ? allData : allData.filter(d => d.source === tab);
  if (tab === 'all') {
    // Global top 20
    filtered = [...filtered].sort((a, b) => (b.score||0) - (a.score||0)).slice(0, 20);
  }

  let html = '';
  if (filtered.length === 0) {
    html = '<div class="loading full-width">暂无数据</div>';
  } else {
    // 按源分组
    const sources = {};
    filtered.forEach(d => {
      if (!sources[d.source]) sources[d.source] = [];
      sources[d.source].push(d);
    });

    for (const [src, items] of Object.entries(sources)) {
      html += `<div class="section"><h2>${getSourceIcon(src)} ${getSourceName(src)}</h2>`;
      items.forEach((d, i) => {
        const rc = getRankClass(i);
        const traffic = d.traffic ? `<span class="meta">${d.traffic}</span>` : '';
        const score = d.score > 0 ? `<span class="score">${d.score}</span>` : '';
        html += `<div class="item">
          <span class="rank ${rc}">${i+1}</span>
          <a href="${d.url || '#'}" target="_blank" rel="noopener">${d.keyword || 'N/A'}</a>${score}
          ${traffic}
        </div>`;
      });
      html += '</div>';
    }
  }
  document.getElementById('content').innerHTML = html;
}

function getSourceName(src) {
  const map = {
    hackernews: 'Hacker News', github: 'GitHub Trending', stackoverflow: 'Stack Overflow',
    wechat: '微信 24h 热文', bluesky: 'Bluesky', devto: 'Dev.to', lobsters: 'Lobste.rs',
    google_trends: 'Google Trends', wikipedia: 'Wikipedia', dockerhub: 'Docker Hub',
    npm: 'npm', pypi: 'PyPI', coingecko: 'CoinGecko'
  };
  return map[src] || src;
}

function getSourceIcon(src) {
  const map = {
    hackernews: '💻', github: '⭐', stackoverflow: '📚', wechat: '💬', bluesky: '🦋',
    devto: '📝', lobsters: '🦞', google_trends: '🔍', wikipedia: '📖', dockerhub: '🐳',
    npm: '📦', pypi: '🐍', coingecko: '🪙'
  };
  return map[src] || '📊';
}

loadData();
</script>
</body>
</html>
